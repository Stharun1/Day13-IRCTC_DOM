<!DOCTYPE html/>

<html lang="en">
<head>
  <title>Train Search</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>


<link rel="stylesheet" href="search.css" />
 
</head>
<body>

  <h1>Train Search</h1>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <input type="text" id="fromStation" class="form-control mb-2" placeholder="From Station" />
        <input type="text" id="toStation"   class="form-control mb-2" placeholder="To Station" />
        <button class="btn btn-primary w-100" onclick="searchTrains()">Search</button>
        <p id="errorMsg" class="error"></p>

        <div id="results" style="margin-top: 20px;"></div>

      </div>
    </div>
  </div>

<script src="search.js"></script>
</body>
</html>
